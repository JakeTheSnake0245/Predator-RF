name: CI

# Two-tier CI: the lightweight stdlib-only suite runs on every push
# (no native deps, finishes in seconds). The numpy-equipped DSP smoke
# tier runs on tagged releases or on a manual dispatch — those tests
# need numpy/scipy installed and golden IQ fixtures.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  unit-stdlib:
    name: Stdlib-only unit suite (76 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Run backend tests (no numpy required)
        run: |
          python -m unittest discover -s backend/tests -p "test_*.py" -v

  dsp-smoke:
    name: DSP smoke tests (requires numpy + golden IQ)
    runs-on: ubuntu-latest
    needs: unit-stdlib
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install DSP deps
        run: pip install numpy scipy aiohttp
      - name: Run DSP smoke (golden IQ fixtures)
        run: python -m unittest backend.tests.test_dsp_smoke -v
